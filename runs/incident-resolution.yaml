_schema_version: "1"

test_case:
  id: incident-resolution
  description: "AI agent resolves a production CPU-spike incident using search, log-reading, and metrics tools"
  created_at: "2026-04-23"
  tags:
    - incident-response
    - demo

# Shared node pool — every path references nodes by ID from this map.
# is_fixpoint: true  →  node is always highlighted; every successful path must pass through it.
# user_important:    →  toggled interactively in the UI and synced back here.
nodes:
  llm-initial:
    type: llm
    label: "Analyze Incident"
    is_fixpoint: true
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 1250
      avg_input_tokens: 850
      avg_output_tokens: 320

  tool-search:
    type: tool
    label: "Search Alerts"
    is_fixpoint: false
    user_important: false
    metadata:
      tool: search
      avg_latency_ms: 230
      args_example:
        query: "CPU spike production alerts last 1h"

  tool-read-logs:
    type: tool
    label: "Read Log Files"
    is_fixpoint: false
    user_important: false
    metadata:
      tool: read_file
      avg_latency_ms: 180
      args_example:
        path: /var/log/app/error.log

  tool-check-metrics:
    type: tool
    label: "Check Metrics"
    is_fixpoint: false
    user_important: false
    metadata:
      tool: check_metrics
      avg_latency_ms: 310
      args_example:
        host: prod-host-42
        metric: cpu_usage

  tool-validate-logs:
    type: tool
    label: "Validate Log Entry"
    is_fixpoint: false
    user_important: false
    metadata:
      tool: validate_log
      avg_latency_ms: 140
      args_example:
        log_line: "OOMKilled: app-worker exceeded memory limit"

  llm-assess:
    type: llm
    label: "Assess Finding"
    is_fixpoint: false
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 980
      avg_input_tokens: 720
      avg_output_tokens: 210

  tool-search-refined:
    type: tool
    label: "Refined Search"
    is_fixpoint: false
    user_important: false
    metadata:
      tool: search
      avg_latency_ms: 195
      args_example:
        query: "OOMKilled app-worker memory limit last 6h"

  llm-correlate:
    type: llm
    label: "Correlate Results"
    is_fixpoint: false
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 1340
      avg_input_tokens: 1050
      avg_output_tokens: 390

  llm-deep-analyze:
    type: llm
    label: "Deep Analysis"
    is_fixpoint: false
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 2100
      avg_input_tokens: 1400
      avg_output_tokens: 680

  llm-resolve:
    type: llm
    label: "Generate Resolution"
    is_fixpoint: true
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 1800
      avg_input_tokens: 1200
      avg_output_tokens: 450

  tool-apply-fix:
    type: tool
    label: "Apply Fix"
    is_fixpoint: false
    user_important: false
    metadata:
      tool: run_command
      avg_latency_ms: 2200
      args_example:
        command: systemctl restart app-worker

  llm-verify:
    type: llm
    label: "Verify Resolution"
    is_fixpoint: true
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 950
      avg_input_tokens: 600
      avg_output_tokens: 180

# Each path is one execution run of the same task.
# Shared (all 3 runs): llm-initial → tool-search → llm-resolve → llm-verify
# run-001: reads logs then resolves directly
# run-002: checks metrics then resolves directly
# run-003: reads logs → retry loop (validate → assess → refined search → correlate → deep-analyze) → resolves
paths:
  - path_id: run-001
    outcome: success
    timestamp: "2026-04-23T10:00:00Z"
    duration_ms: 5790
    node_sequence:
      - llm-initial
      - tool-search
      - tool-read-logs
      - llm-resolve
      - tool-apply-fix
      - llm-verify
    edges:
      - {from: llm-initial, to: tool-search}
      - {from: tool-search, to: tool-read-logs}
      - {from: tool-read-logs, to: llm-resolve}
      - {from: llm-resolve, to: tool-apply-fix}
      - {from: tool-apply-fix, to: llm-verify}

  - path_id: run-002
    outcome: success
    timestamp: "2026-04-23T10:15:00Z"
    duration_ms: 6120
    node_sequence:
      - llm-initial
      - tool-search
      - tool-check-metrics
      - llm-resolve
      - tool-apply-fix
      - llm-verify
    edges:
      - {from: llm-initial, to: tool-search}
      - {from: tool-search, to: tool-check-metrics}
      - {from: tool-check-metrics, to: llm-resolve}
      - {from: llm-resolve, to: tool-apply-fix}
      - {from: tool-apply-fix, to: llm-verify}

  - path_id: run-003
    outcome: partial
    timestamp: "2026-04-23T10:31:00Z"
    duration_ms: 12850
    node_sequence:
      - llm-initial
      - tool-search
      - tool-read-logs
      - tool-validate-logs
      - llm-assess
      - tool-search-refined
      - llm-correlate
      - llm-deep-analyze
      - llm-resolve
      - llm-verify
    edges:
      - {from: llm-initial, to: tool-search}
      - {from: tool-search, to: tool-read-logs}
      - {from: tool-read-logs, to: tool-validate-logs}
      - {from: tool-validate-logs, to: llm-assess}
      - {from: llm-assess, to: tool-search-refined}
      - {from: tool-search-refined, to: llm-correlate}
      - {from: llm-correlate, to: llm-deep-analyze}
      - {from: llm-deep-analyze, to: llm-resolve}
      - {from: llm-resolve, to: llm-verify}