      kind: llm
      latency_ms: 950.0
      cost_usd: 0.003
      input_tokens: 600
      output_tokens: 180
  tool-check-metrics:
    type: tool
    label: Check Metrics
    is_fixpoint: false
    user_important: false
    metadata:
      tool: check_metrics
      avg_latency_ms: 310
      args_example:
        host: prod-host-42
        metric: cpu_usage
    cost:
      kind: tool
      latency_ms: 310.0
      cost_usd: 0.001
