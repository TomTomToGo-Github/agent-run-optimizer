_schema_version: '2'
test_case_id: incident-resolution
description: AI agent resolves a production CPU-spike incident using search, log-reading,
  and metrics tools
created_at: '2026-04-23'
tags:
- incident-response
- demo
path_id: run-002
outcome: success
timestamp: '2026-04-23T10:15:00+00:00'
duration_ms: 6120
metadata: {}
node_sequence:
- llm-initial
- tool-search
- tool-check-metrics
- llm-resolve
- tool-apply-fix
- llm-verify
edges:
- from: llm-initial
  to: tool-search
- from: tool-search
  to: tool-check-metrics
- from: tool-check-metrics
  to: llm-resolve
- from: llm-resolve
  to: tool-apply-fix
- from: tool-apply-fix
  to: llm-verify
nodes:
  llm-initial:
    type: llm
    label: Analyze Incident
    is_fixpoint: true
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 1250
      avg_input_tokens: 850
      avg_output_tokens: 320
    cost:
      kind: llm
      latency_ms: 1250.0
      cost_usd: 0.0045
      input_tokens: 850
      output_tokens: 320
  tool-search:
    type: tool
    label: Search Alerts
    is_fixpoint: false
    user_important: false
    metadata:
      tool: search
      avg_latency_ms: 230
      args_example:
        query: CPU spike production alerts last 1h
    cost:
      kind: tool
      latency_ms: 230.0
      cost_usd: 0.0008
  llm-resolve:
    type: llm
    label: Generate Resolution
    is_fixpoint: true
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 1800
      avg_input_tokens: 1200
      avg_output_tokens: 450
    cost:
      kind: llm
      latency_ms: 1800.0
      cost_usd: 0.0072
      input_tokens: 1200
      output_tokens: 450
  tool-apply-fix:
    type: tool
    label: Apply Fix
    is_fixpoint: false
    user_important: false
    metadata:
      tool: run_command
      avg_latency_ms: 2200
      args_example:
        command: systemctl restart app-worker
    cost:
      kind: tool
      latency_ms: 2200.0
      cost_usd: 0.002
  llm-verify:
    type: llm
    label: Verify Resolution
    is_fixpoint: true
    user_important: false
    metadata:
      model: claude-opus-4-7
      temperature: 1.0
      avg_latency_ms: 950
      avg_input_tokens: 600
      avg_output_tokens: 180
